<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>イヤポイ | 心のゴミ捨て場</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 1. 【Preserve】シューーーと加速して宇宙へ飛んでいくアニメーション */
        @keyframes shuuuToSpace {
            0% { transform: scale(1) translateY(0) rotate(0deg); opacity: 1; }
            30% { transform: scale(1.1) translateY(-30px) rotate(10deg); opacity: 1; }
            100% { transform: scale(0.05) translateY(-2000px) rotate(720deg); opacity: 0; }
        }
        /* 加速（ease-in）を使って、後半一気に速くする */
        .animate-shuuu-throw {
            animation: shuuuToSpace 1.5s forwards ease-in;
        }

        /* 2. 【Preserve】背景設定 */
        body { transition: background 0.5s ease; }
        .bg-pastel { background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); }
        /* 宇宙の背景：黒ベースのグラデーション */
        .bg-space {
            background: radial-gradient(circle, #1a1a2e 0%, #000000 100%) !important;
        }

        /* 3. 【New】星空のデザイン */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5; /* コンテンツの下に配置 */
            pointer-events: none; /* クリックを邪魔しない */
            /* コードだけで小さな光の点（星）を散りばめる */
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 130px 80px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 160px 120px, #eee, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            opacity: 0; /* 最初は隠しておく */
            transition: opacity 1s ease; /* ふわっと表示させる */
        }
        /* 星を表示させるためのクラス */
        .stars-active {
            opacity: 1;
        }

        /* 4. 【Preserve】感情タグが選択された時の色 */
        .tag-selected {
            background-color: #60a5fa !important;
            color: white !important;
            border-color: #60a5fa !important;
        }

        .hidden { display: none; }
        /* 画面が重ならないように設定 */
        .screen { z-index: 10; position: relative; }
    </style>
</head>
<body class="bg-pastel min-h-screen font-sans text-gray-700 flex flex-col items-center justify-center p-4 overflow-hidden">

    <div id="star-layer" class="stars"></div>

    <div id="screen-home" class="screen w-full max-w-md bg-white rounded-3xl shadow-xl p-8 text-center">
        <div class="mb-6 text-sm text-gray-400">スカッとする！</div>
        <div class="text-6xl font-bold text-blue-400 mb-4 tracking-tighter">トラッシュ</div>
        <p class="mb-8 text-gray-500 text-sm">モヤモヤ、溜まってませんか？</p>
        <button onclick="navTo('screen-input')" class="w-full bg-blue-400 text-white py-4 rounded-full font-bold shadow-lg hover:bg-blue-500 transition">
            宇宙に投げよう
        </button>
    </div>

    <div id="screen-input" class="screen w-full max-w-md bg-white rounded-3xl shadow-xl p-8 hidden overflow-y-auto max-h-[90vh]">
        <h2 class="text-xl font-bold mb-6 text-center">今の気持ちを吐き出す</h2>
        
        <label class="block mb-2 text-sm font-medium text-center">感情タグ（複数選択可）</label>
        <div class="flex flex-wrap gap-2 mb-6 justify-center">
            <span onclick="toggleTag(this)" class="px-4 py-2 border rounded-full text-xs cursor-pointer hover:bg-blue-50 transition-colors">イライラ</span>
            <span onclick="toggleTag(this)" class="px-4 py-2 border rounded-full text-xs cursor-pointer hover:bg-blue-50 transition-colors">悲しい</span>
            <span onclick="toggleTag(this)" class="px-4 py-2 border rounded-full text-xs cursor-pointer hover:bg-blue-50 transition-colors">不安</span>
            <span onclick="toggleTag(this)" class="px-4 py-2 border rounded-full text-xs cursor-pointer hover:bg-blue-50 transition-colors">悔しい</span>
            <span onclick="toggleTag(this)" class="px-4 py-2 border rounded-full text-xs cursor-pointer hover:bg-blue-50 transition-colors">寂しい</span>
            <span onclick="toggleTag(this)" class="px-4 py-2 border rounded-full text-xs cursor-pointer hover:bg-blue-50 transition-colors">むかつく</span>
            <span onclick="toggleTag(this)" class="px-4 py-2 border rounded-full text-xs cursor-pointer hover:bg-blue-50 transition-colors">疲れた</span>
            <span onclick="toggleTag(this)" class="px-4 py-2 border rounded-full text-xs cursor-pointer hover:bg-blue-50 transition-colors">落ち込む</span>
            <span onclick="toggleTag(this)" class="px-4 py-2 border rounded-full text-xs cursor-pointer hover:bg-blue-50 transition-colors">焦り</span>
            <span onclick="toggleTag(this)" class="px-4 py-2 border rounded-full text-xs cursor-pointer hover:bg-blue-50 transition-colors">恥ずかしい</span>
            <span onclick="toggleTag(this)" class="px-4 py-2 border rounded-full text-xs cursor-pointer hover:bg-blue-50 transition-colors">ショック</span>
            <span onclick="toggleTag(this)" class="px-4 py-2 border rounded-full text-xs cursor-pointer hover:bg-blue-50 transition-colors">モヤモヤ</span>
            <span onclick="toggleTag(this)" class="px-4 py-2 border rounded-full text-xs cursor-pointer hover:bg-blue-50 transition-colors">がっかり</span>
            <span onclick="toggleTag(this)" class="px-4 py-2 border rounded-full text-xs cursor-pointer hover:bg-blue-50 transition-colors">嫌悪感</span>
            <span onclick="toggleTag(this)" class="px-4 py-2 border rounded-full text-xs cursor-pointer hover:bg-blue-50 transition-colors">孤独</span>
            <span onclick="toggleTag(this)" class="px-4 py-2 border rounded-full text-xs cursor-pointer hover:bg-blue-50 transition-colors">不満</span>
            <span onclick="toggleTag(this)" class="px-4 py-2 border rounded-full text-xs cursor-pointer hover:bg-blue-50 transition-colors">不快</span>
            <span onclick="toggleTag(this)" class="px-4 py-2 border rounded-full text-xs cursor-pointer hover:bg-blue-50 transition-colors">怖い</span>
            <span onclick="toggleTag(this)" class="px-4 py-2 border rounded-full text-xs cursor-pointer hover:bg-blue-50 transition-colors">心配</span>
            <span onclick="toggleTag(this)" class="px-4 py-2 border rounded-full text-xs cursor-pointer hover:bg-blue-50 transition-colors">自己嫌悪</span>
            <span onclick="toggleTag(this)" class="px-4 py-2 border rounded-full text-xs cursor-pointer hover:bg-blue-50 transition-colors">プレッシャー</span>
            <span onclick="toggleTag(this)" class="px-4 py-2 border rounded-full text-xs cursor-pointer hover:bg-blue-50 transition-colors">混乱</span>
            <span onclick="toggleTag(this)" class="px-4 py-2 border rounded-full text-xs cursor-pointer hover:bg-blue-50 transition-colors">無力感</span>
        </div>

        <label class="block mb-2 text-sm font-medium">出来事を書く</label>
        <textarea id="trash-text" class="w-full border rounded-2xl p-4 mb-6 h-32 outline-none focus:ring-2 focus:ring-blue-200" placeholder="何があった？"></textarea>

        <button onclick="startRitual()" class="w-full bg-gray-800 text-white py-4 rounded-full font-bold shadow-lg hover:opacity-90 transition flex items-center justify-center gap-2">
            <span>🚀</span>
            <span>シューーーと捨てる</span>
        </button>
    </div>

    <div id="screen-ritual" class="screen fixed inset-0 flex flex-col items-center justify-center hidden p-4">
        <div id="trash-item" class="bg-white p-8 rounded-2xl shadow-2xl text-gray-800 italic text-xl max-w-xs text-center break-words">
            </div>
    </div>

    <div id="screen-result" class="screen w-full max-w-md bg-white rounded-3xl shadow-xl p-8 text-center hidden">
        <div class="text-5xl mb-6">✨</div>
        <h2 class="text-2xl font-bold mb-4">ポイしました！</h2>
        <p class="text-gray-500 mb-8 italic">「それは嫌で当然のことです。<br>明日まで持ち越さなくて大丈夫。」</p>
        <button onclick="resetApp()" class="w-full border-2 border-blue-400 text-blue-400 py-4 rounded-full font-bold hover:bg-blue-50 transition">
            ホームに戻る
        </button>
    </div>

    <script>
        // 【Preserve】効果音のURL（動作確認用）
        // このURLは、フリー素材サイト「効果音ラボ」様の素材（宇宙空間1）を使用しています。
        const shuuuSoundUrl = "https://soundeffect-lab.info/sound/various/various-mp3/space1.mp3"; 

        // 1. 【Update】画面遷移と背景・星空の切り替え
        function navTo(screenId) {
            document.querySelectorAll('.screen').forEach(el => el.classList.add('hidden'));
            document.getElementById(screenId).classList.remove('hidden');

            const starLayer = document.getElementById('star-layer');

            // 宇宙画面（儀式）または完了画面のとき
            if (screenId === 'screen-ritual' || screenId === 'screen-result') {
                // 背景を一気に宇宙にする（Tailwindのクラスを書き換え）
                document.body.className = 'bg-space min-h-screen font-sans flex flex-col items-center justify-center p-4 overflow-hidden';
                // 星空をふわっと表示させる
                starLayer.classList.add('stars-active');
            } else {
                // ホーム・入力画面のときはパステル背景に戻す
                document.body.className = 'bg-pastel min-h-screen font-sans flex flex-col items-center justify-center p-4 overflow-hidden text-gray-700';
                // 星空を消す
                starLayer.classList.remove('stars-active');
            }
        }

        // 2. 【Preserve】タグの選択切り替え
        function toggleTag(el) {
            el.classList.toggle('tag-selected');
        }

        // 3. 【Preserve】捨てる儀式の実行
        function startRitual() {
            const text = document.getElementById('trash-text').value;
            const selectedTags = Array.from(document.querySelectorAll('.tag-selected'))
                                    .map(el => el.innerText);

            if(!text && selectedTags.length === 0) return alert('気持ちを書いてくださいね！');

            const item = document.getElementById('trash-item');
            const tagsDisplay = selectedTags.length > 0 ? `【${selectedTags.join(', ')}】\n` : "";
            item.innerText = tagsDisplay + text;
            
            navTo('screen-ritual');

            // 効果音を再生
            const audio = new Audio(shuuuSoundUrl);
            audio.volume = 0.5; // 音量を半分に設定
            audio.play().catch(e => console.log("Audio play failed:", e)); // ブラウザの制限によるエラーをキャッチ

            // アニメーション開始（効果音と同時に）
            setTimeout(() => {
                item.classList.add('animate-shuuu-throw');
            }, 300);

            // 犹予を持たせて2.5秒後に結果画面へ（音とアニメーションが終わるのを待つ）
            setTimeout(() => {
                item.classList.remove('animate-shuuu-throw');
                navTo('screen-result');
            }, 2500);
        }

        // 4. 【Preserve】アプリのリセット
        function resetApp() {
            document.getElementById('trash-text').value = '';
            document.querySelectorAll('.tag-selected').forEach(el => el.classList.remove('tag-selected'));
            navTo('screen-home');
        }
    </script>
</body>
</html>
