<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>イヤポイ | 心のゴミ捨て場</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* --- ここから追加 --- */
        /* 宇宙へ放つアニメーション：縮小しながら上に消える */
        @keyframes throwToSpace {
            0% { transform: scale(1) translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: scale(0) translateY(-600px) rotate(180deg); opacity: 0; }
        }
        .animate-space-throw { animation: throwToSpace 1.5s forwards ease-in; }

        /* 宇宙の背景：黒ベースのグラデーション */
        .bg-space {
            background: radial-gradient(circle, #2a2a2a 0%, #000000 100%) !important;
        }
        /* --- ここまで追加 --- */
        @keyframes throwAway {
            0% { transform: scale(1) translateY(0); opacity: 1; }
            50% { transform: scale(0.5) translateY(-100px); opacity: 0.5; }
            100% { transform: scale(0) translateY(200px); opacity: 0; }
        }
        .animate-throw { animation: throwAway 0.8s forwards ease-in-out; }
        .hidden { display: none; }
        .bg-pastel { background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); }
    </style>
</head>
<body class="bg-pastel min-h-screen font-sans text-gray-700 flex flex-col items-center justify-center p-4">

    <div id="screen-home" class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8 text-center">
        <div class="mb-6 text-sm text-gray-400">スカッとする！いやポイ</div>
        <div class="text-6xl font-bold text-blue-400 mb-4">スカッシュ</div>
        <p class="mb-8">モヤモヤ、溜まってませんか？</p>
        <button onclick="navTo('screen-input')" class="w-full bg-blue-400 text-white py-4 rounded-full font-bold shadow-lg hover:bg-blue-500 transition">
            宇宙に投げよう
        </button>
    </div>

    <div id="screen-input" class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8 hidden">
        <h2 class="text-xl font-bold mb-6">今の気持ちを吐き出す</h2>
        
        <label class="block mb-2 text-sm font-medium">感情タグ</label>
        <div class="flex flex-wrap gap-2 mb-6">
            <span class="px-4 py-2 border rounded-full text-sm cursor-pointer hover:bg-blue-50">イライラ</span>
            <span class="px-4 py-2 border rounded-full text-sm cursor-pointer hover:bg-blue-50">悲しい</span>
            <span class="px-4 py-2 border rounded-full text-sm cursor-pointer hover:bg-blue-50">不安</span>
            <span class="px-4 py-2 border rounded-full text-sm cursor-pointer hover:bg-blue-50">悔しい</span>
<span class="px-4 py-2 border rounded-full text-sm cursor-pointer hover:bg-blue-50">寂しい</span>
<span class="px-4 py-2 border rounded-full text-sm cursor-pointer hover:bg-blue-50">むかつく</span>
<span class="px-4 py-2 border rounded-full text-sm cursor-pointer hover:bg-blue-50">疲れた</span>
<span class="px-4 py-2 border rounded-full text-sm cursor-pointer hover:bg-blue-50">落ち込む</span>
<span class="px-4 py-2 border rounded-full text-sm cursor-pointer hover:bg-blue-50">焦り</span>
<span class="px-4 py-2 border rounded-full text-sm cursor-pointer hover:bg-blue-50">恥ずかしい</span>
<span class="px-4 py-2 border rounded-full text-sm cursor-pointer hover:bg-blue-50">ショック</span>
<span class="px-4 py-2 border rounded-full text-sm cursor-pointer hover:bg-blue-50">モヤモヤ</span>
<span class="px-4 py-2 border rounded-full text-sm cursor-pointer hover:bg-blue-50">がっかり</span>
<span class="px-4 py-2 border rounded-full text-sm cursor-pointer hover:bg-blue-50">嫌悪感</span>
<span class="px-4 py-2 border rounded-full text-sm cursor-pointer hover:bg-blue-50">孤独</span>
<span class="px-4 py-2 border rounded-full text-sm cursor-pointer hover:bg-blue-50">不満</span>
<span class="px-4 py-2 border rounded-full text-sm cursor-pointer hover:bg-blue-50">不快</span>
<span class="px-4 py-2 border rounded-full text-sm cursor-pointer hover:bg-blue-50">怖い</span>
<span class="px-4 py-2 border rounded-full text-sm cursor-pointer hover:bg-blue-50">心配</span>
<span class="px-4 py-2 border rounded-full text-sm cursor-pointer hover:bg-blue-50">自己嫌悪</span>
<span class="px-4 py-2 border rounded-full text-sm cursor-pointer hover:bg-blue-50">プレッシャー</span>
<span class="px-4 py-2 border rounded-full text-sm cursor-pointer hover:bg-blue-50">混乱</span>
<span class="px-4 py-2 border rounded-full text-sm cursor-pointer hover:bg-blue-50">無力感</span>
        </div>

        <label class="block mb-2 text-sm font-medium">出来事を書く</label>
        <textarea id="trash-text" class="w-full border rounded-2xl p-4 mb-6 h-32 outline-none focus:ring-2 focus:ring-blue-200" placeholder="何があった？"></textarea>

        <label class="block mb-2 text-sm font-medium">不快度 (0-10)</label>
        <input type="range" class="w-full mb-8 cursor-pointer">

        <button onclick="startRitual()" class="w-full bg-gray-800 text-white py-4 rounded-full font-bold shadow-lg">
            捨てる
        </button>
    </div>
            <div id="screen-ritual" class="fixed inset-0 flex flex-col items-center justify-center hidden p-4 z-50" style="background: radial-gradient(circle, #1a1a2e 0%, #000000 100%)">
        <div id="trash-item" class="bg-gray-100 p-8 rounded-2xl shadow-lg text-gray-800 italic mb-12">
            </div>
        <div class="h-20"></div> 
    </div>
    <div id="screen-result" class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8 text-center hidden">
        <div class="text-5xl mb-6">✨</div>
        <h2 class="text-2xl font-bold mb-4">ポイしました！</h2>
        <p class="text-gray-500 mb-8 italic">「それは嫌で当然のことです。<br>明日まで持ち越さなくて大丈夫。」</p>
        <button onclick="navTo('screen-home')" class="w-full border-2 border-blue-400 text-blue-400 py-4 rounded-full font-bold">
            ホームに戻る
        </button>
    </div>

    <script>
        function navTo(screenId) {
            // 全ての画面を隠す
            document.querySelectorAll('[id^="screen-"]').forEach(el => el.classList.add('hidden'));
            // 指定した画面だけ表示
            document.getElementById(screenId).classList.remove('hidden');
        }

        function startRitual() {
            const text = document.getElementById('trash-text').value;
            if(!text) return alert('何か書いてみて！');

            const item = document.getElementById('trash-item');
            item.innerText = text;
            
            navTo('screen-ritual');

            // 0.2秒後にアニメーション開始
            setTimeout(() => {
                // ↓ アニメーションクラス名を修正
                item.classList.add('animate-space-throw');
            }, 200);

            // アニメーション終了後にリザルト画面へ（少し時間を伸ばす 1.5秒 + α）
            setTimeout(() => {
                // ↓ アニメーションクラス名を修正
                item.classList.remove('animate-space-throw');
                navTo('screen-result');
            }, 2000);
        }
        </script>
</body>
</html>
